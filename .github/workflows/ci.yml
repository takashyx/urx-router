name: CI

# Lightweight checks on every PR and on pushes to main. Heavier jobs
# (Playwright E2E, third-party license generation) run post-merge; see
# post-merge.yml.
# Doc-only changes (Markdown, docs/, reference/) don't affect the build or
# tests, so skip these checks for them.
on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'reference/**'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'reference/**'

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
