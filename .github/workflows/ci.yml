name: CI

# Lightweight checks on every PR and on pushes to main. Heavier jobs
# (Playwright E2E, third-party license generation) run post-merge; see
# post-merge.yml.
# Doc-only changes (Markdown, docs/) don't affect the build or tests, so skip
# these checks for them — except the skill's generated model references, which
# skill-export.test.ts diffs against the generator, so an .md-only edit there
# must still run the unit tests. Patterns are ordered: include everything,
# negate docs, then re-include the generated files (the last match wins).
on:
  pull_request:
    paths:
      - '**'
      - '!**/*.md'
      - '!docs/**'
      - '.claude/skills/urx-routing-planner/references/model-*.md'
  push:
    branches: [main]
    paths:
      - '**'
      - '!**/*.md'
      - '!docs/**'
      - '.claude/skills/urx-routing-planner/references/model-*.md'

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
