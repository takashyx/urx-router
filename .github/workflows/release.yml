name: Release

# Builds desktop installers (macOS .dmg/.app, Windows .msi/.exe) with
# tauri-action and attaches them to a draft GitHub Release. Push a vX.Y.Z tag
# to cut a release; the draft is left for manual review before publishing.
# A manual workflow_dispatch run only builds and uploads the bundles as job
# artifacts (no release), useful for verifying the packaging pipeline.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      prerelease: ${{ steps.check.outputs.prerelease }}
      validTag: ${{ steps.check.outputs.validTag }}
    steps:
      - id: check
        # Accept vX.Y.Z as stable and vX.Y.Z-{alpha,beta,rc}* as prerelease.
        # workflow_dispatch carries no tag, so validTag stays false there.
        run: |
          if [[ "${GITHUB_EVENT_NAME}" != 'push' ]]; then
            echo 'validTag=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          shopt -s extglob
          tag="${GITHUB_REF_NAME#v}"
          case "${tag}" in
            +([0-9]).+([0-9]).+([0-9]) )
              echo 'validTag=true' >> "$GITHUB_OUTPUT"
              echo 'prerelease=false' >> "$GITHUB_OUTPUT"
              echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
              ;;
            +([0-9]).+([0-9]).+([0-9])-@(alpha|beta|rc)*([0-9.]) )
              echo 'validTag=true' >> "$GITHUB_OUTPUT"
              echo 'prerelease=true' >> "$GITHUB_OUTPUT"
              echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo 'validTag=false' >> "$GITHUB_OUTPUT"
              ;;
          esac

  create-release:
    needs: check-tag
    if: needs.check-tag.outputs.validTag == 'true'
    runs-on: ubuntu-latest
    outputs:
      releaseId: ${{ steps.release.outputs.result }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TAG: ${{ needs.check-tag.outputs.version }}
          PRERELEASE: ${{ needs.check-tag.outputs.prerelease }}
        with:
          result-encoding: string
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG,
              name: process.env.TAG,
              draft: true,
              prerelease: process.env.PRERELEASE === 'true',
              generate_release_notes: true,
            })
            return data.id

  build:
    needs: [check-tag, create-release]
    # Run even when create-release is skipped (manual dispatch), as long as the
    # tag check itself succeeded.
    if: always() && needs.check-tag.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --target aarch64-apple-darwin
            rustTargets: aarch64-apple-darwin
          - platform: windows-latest
            args: ''
            rustTargets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      # SHA pin drops the branch-name toolchain shorthand, so the channel is
      # passed explicitly. No version tags; Dependabot leaves this pin alone.
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          targets: ${{ matrix.rustTargets }}
      - uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      # Generate the third-party license notice bundled as an app resource
      # (bundle.resources). Same tool pinning as the post-merge licenses job.
      - uses: taiki-e/cache-cargo-install-action@417450f3c33ee20393705369577571770643d4c7 # v3.0.7
        with:
          tool: cargo-about@0.9.1
          features: cli
      - run: cargo about generate about.hbs -o THIRD_PARTY_LICENSES.html
        working-directory: src-tauri
      - id: tauri
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (minisign). Required for auto-update: tauri-action
          # signs the bundles and emits latest.json only when these are set.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS signing + notarization. All optional: with the secrets unset
          # tauri-action ships an unsigned bundle (Gatekeeper warning on launch).
          APPLE_CERTIFICATE: ${{ secrets.MACOS_SIGNING_CERT }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_USERNAME }}
          APPLE_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
        with:
          # Empty on a manual run, so tauri-action builds without uploading.
          releaseId: ${{ needs.create-release.outputs.releaseId }}
          args: ${{ matrix.args }}
      # On a manual dispatch there is no release to attach to, so surface the
      # bundles as downloadable job artifacts instead.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: needs.check-tag.outputs.validTag != 'true'
        with:
          name: urx-router-${{ matrix.platform }}
          path: |
            src-tauri/target/**/bundle/dmg/*.dmg
            src-tauri/target/**/bundle/nsis/*.exe
            src-tauri/target/**/bundle/msi/*.msi
          if-no-files-found: error
