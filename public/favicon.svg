    <circle cx="724" cy="424" r="70" fill="#0c0a07" />
    <circle cx="724" cy="424" r="63" fill="none" stroke="#ffb84d" stroke-width="14" />
    <circle cx="724" cy="424" r="26" fill="#ffd27a" />
  </g>
