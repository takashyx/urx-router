<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="google-site-verification" content="O6oFrJyEg-Om0e19Q1QZpGG3DeKfy0ggL_tQWnAaWgI" />
    <title>URX Router — YAMAHA URX22 / URX44 / URX44V routing planner</title>
    <meta
      name="description"
      content="Free tool to plan and visualize routing for the YAMAHA URX22, URX44, and URX44V USB audio interfaces. Map inputs, mixer buses, and output patches in the browser; a desktop app adds save/load, image export, and live device control."
    />
    <meta
      name="keywords"
      content="YAMAHA URX22, YAMAHA URX44, YAMAHA URX44V, URX routing, URX PC control, URX control software, USB audio interface routing, mixer routing planner"
    />
    <link rel="canonical" href="https://urx-router.semnil.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://urx-router.semnil.com/" />
    <meta property="og:title" content="URX Router — YAMAHA URX22 / URX44 / URX44V routing planner" />
    <meta
      property="og:description"
      content="Plan and visualize routing for the YAMAHA URX22 / URX44 / URX44V in the browser. Desktop app adds save/load, image export, and live device control."
    />
    <meta property="og:image" content="https://raw.githubusercontent.com/semnil/urx-router/main/docs/assets/screenshot-en.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="URX Router — YAMAHA URX22 / URX44 / URX44V routing planner" />
    <meta
      name="twitter:description"
      content="Plan and visualize routing for the YAMAHA URX22 / URX44 / URX44V in the browser. Desktop app adds save/load, image export, and live device control."
    />
    <meta name="twitter:image" content="https://raw.githubusercontent.com/semnil/urx-router/main/docs/assets/screenshot-en.png" />
  </head>
  <body>
    <div id="app">
      <header id="toolbar">
        <div class="brand">
          <span class="led"></span>
          <span class="word">URX·ROUTER</span>
          <span class="meta">routing planner</span>
          <span class="seg" aria-hidden="true">
            <i style="height: 9px"></i>
            <i style="height: 15px"></i>
            <i style="height: 12px"></i>
            <i style="height: 18px"></i>
            <i style="height: 8px"></i>
            <i style="height: 13px"></i>
          </span>
        </div>
        <label class="model-select">
          <span id="lbl-model">Model</span>
          <select id="model-picker"></select>
        </label>
        <label class="model-select">
          <span id="lbl-rate">Rate</span>
          <select id="rate-picker"></select>
        </label>
        <span class="spacer"></span>
        <span id="live-tally" class="live-tally" role="status" aria-live="polite" hidden></span>
        <div class="tools">
          <div class="menu" data-demo-hide>
            <button
              id="btn-file"
              class="menu-trigger"
              type="button"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="file-menu"
            >
              <span id="lbl-file">File</span>
              <svg class="caret" viewBox="0 0 10 6" aria-hidden="true">
                <path
                  d="M1 1l4 4 4-4"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <div id="file-menu" class="menu-panel" role="menu" aria-labelledby="btn-file" hidden>
              <button id="btn-new" class="menu-item" type="button" role="menuitem">New</button>
              <span class="menu-sep" role="separator"></span>
              <button id="btn-open" class="menu-item" type="button" role="menuitem">Open</button>
              <button id="btn-save" class="menu-item" type="button" role="menuitem">Save</button>
              <span class="menu-sep" role="separator"></span>
              <button id="btn-export" class="menu-item" type="button" role="menuitem">Export PNG</button>
              <button id="btn-export-pdf" class="menu-item" type="button" role="menuitem">Export PDF</button>
            </div>
          </div>
          <span class="tool-sep" data-control-hide></span>
          <div class="menu" data-control-hide>
            <button
              id="btn-device"
              class="menu-trigger"
              type="button"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="device-menu"
            >
              <span id="lbl-device">Device</span>
              <svg class="caret" viewBox="0 0 10 6" aria-hidden="true">
                <path
                  d="M1 1l4 4 4-4"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <div id="device-menu" class="menu-panel" role="menu" aria-labelledby="btn-device" hidden>
              <button id="btn-live" class="menu-item" type="button" role="menuitem" aria-pressed="false" hidden>
                Live sync
              </button>
              <span class="menu-sep" role="separator" data-live-only hidden></span>
              <button id="btn-fetch" class="menu-item" type="button" role="menuitem">Fetch from device</button>
              <button id="btn-write" class="menu-item" type="button" role="menuitem" disabled>Write to device</button>
              <button id="btn-selftest" class="menu-item" type="button" role="menuitem" hidden>Self-test (experimental)</button>
            </div>
          </div>
          <span class="tool-sep"></span>
          <button id="btn-auto" type="button">Arrange</button>
          <button id="btn-hide-unused" type="button">Hide unused</button>
          <button id="btn-labels" type="button" aria-pressed="false"></button>
          <span class="tool-sep"></span>
          <button id="btn-theme" type="button"></button>
          <button id="btn-lang" type="button"></button>
          <a
            id="btn-desktop"
            class="desktop-link"
            href="https://github.com/semnil/urx-router"
            target="_blank"
            rel="noopener"
            data-demo-only
            hidden
          >
            <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
              <path
                fill="currentColor"
                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
              />
            </svg>
            <span id="lbl-desktop">Desktop app</span>
          </a>
        </div>
      </header>
      <main id="stage">
        <div id="graph-host"></div>
        <aside id="inspector"></aside>
      </main>
      <footer id="statusbar"></footer>
    </div>
    <input id="file-input" type="file" accept="application/json,.json" hidden />
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
