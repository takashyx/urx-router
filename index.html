<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="google-site-verification" content="O6oFrJyEg-Om0e19Q1QZpGG3DeKfy0ggL_tQWnAaWgI" />
    <title>URX Router — YAMAHA URX22 / URX44 / URX44V routing planner &amp; unofficial mixer control</title>
    <meta
      name="description"
      content="Plan and visualize routing for the YAMAHA URX22, URX44, and URX44V USB audio interfaces — and control the mixer from your computer. The URX series has no dspMixFx; this unofficial desktop app reads, writes, and live-syncs the full mixer, with a free in-browser demo."
    />
    <meta
      name="keywords"
      content="YAMAHA URX22, YAMAHA URX44, YAMAHA URX44V, URX routing, URX PC control, URX control software, URX dspMixFx, URX44 dspMixFx, URX mixer control, URX remote control, USB audio interface routing, mixer routing planner"
    />
    <link rel="canonical" href="https://urx-router.semnil.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://urx-router.semnil.com/" />
    <meta property="og:site_name" content="URX Router" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ja_JP" />
    <meta property="og:title" content="URX Router — YAMAHA URX22 / URX44 / URX44V routing planner &amp; unofficial mixer control" />
    <meta
      property="og:description"
      content="Plan and visualize routing for the YAMAHA URX22 / URX44 / URX44V in the browser. The desktop app adds save/load, image export, and unofficial full-mixer control (read / write / live sync)."
    />
    <meta property="og:image" content="https://raw.githubusercontent.com/semnil/urx-router/main/docs/assets/screenshot-en.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="675" />
    <meta property="og:image:alt" content="URX Router showing a URX44V routing plan in the dark studio-rack theme" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="URX Router — YAMAHA URX22 / URX44 / URX44V routing planner &amp; unofficial mixer control" />
    <meta
      name="twitter:description"
      content="Plan and visualize routing for the YAMAHA URX22 / URX44 / URX44V in the browser. The desktop app adds save/load, image export, and unofficial full-mixer control (read / write / live sync)."
    />
    <meta name="twitter:image" content="https://raw.githubusercontent.com/semnil/urx-router/main/docs/assets/screenshot-en.png" />
  </head>
  <body>
    <div id="app">
      <header id="toolbar">
        <div class="brand">
          <span class="led"></span>
          <span class="word">URX·ROUTER</span>
        </div>
        <label class="model-select">
          <span id="lbl-model">Model</span>
          <select id="model-picker"></select>
        </label>
        <label class="model-select">
          <span id="lbl-rate">Rate</span>
          <select id="rate-picker"></select>
        </label>
        <div class="view-tabs" id="view-tabs" role="group" aria-label="View">
          <button id="btn-view-graph" type="button" aria-pressed="true">Graph</button>
          <button id="btn-view-console" type="button" aria-pressed="false">Console</button>
        </div>
        <span class="spacer"></span>
        <span id="live-tally" class="live-tally" role="status" aria-live="polite" hidden></span>
        <div class="tools">
          <div class="menu" data-demo-hide>
            <button
              id="btn-file"
              class="menu-trigger"
              type="button"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="file-menu"
            >
              <span id="lbl-file">File</span>
              <svg class="caret" viewBox="0 0 10 6" aria-hidden="true">
                <path
                  d="M1 1l4 4 4-4"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <div id="file-menu" class="menu-panel" role="menu" aria-labelledby="btn-file" hidden>
              <button id="btn-new" class="menu-item" type="button" role="menuitem">New</button>
              <span class="menu-sep" role="separator"></span>
              <button id="btn-open" class="menu-item" type="button" role="menuitem">Open</button>
              <button id="btn-save" class="menu-item" type="button" role="menuitem">Save</button>
              <span class="menu-sep" role="separator"></span>
              <button id="btn-export" class="menu-item" type="button" role="menuitem">Export PNG</button>
              <button id="btn-export-pdf" class="menu-item" type="button" role="menuitem">Export PDF</button>
              <span class="menu-sep" role="separator" data-control-hide></span>
              <button id="btn-licenses" class="menu-item" type="button" role="menuitem" data-control-hide>Third-party licenses</button>
            </div>
          </div>
          <span class="tool-sep" data-control-hide></span>
          <div class="menu" data-control-hide>
            <button
              id="btn-device"
              class="menu-trigger"
              type="button"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="device-menu"
            >
              <span id="lbl-device">Device</span>
              <svg class="caret" viewBox="0 0 10 6" aria-hidden="true">
                <path
                  d="M1 1l4 4 4-4"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <div id="device-menu" class="menu-panel" role="menu" aria-labelledby="btn-device" hidden>
              <button id="btn-live" class="menu-item" type="button" role="menuitem" aria-pressed="false" hidden>
                Live sync
              </button>
              <span class="menu-sep" role="separator"></span>
              <button id="btn-fetch" class="menu-item" type="button" role="menuitem">Fetch from device</button>
              <button id="btn-write" class="menu-item" type="button" role="menuitem" disabled>Write to device</button>
              <span class="menu-sep" role="separator"></span>
              <button id="btn-midi" class="menu-item" type="button" role="menuitem">MIDI control</button>
              <span class="menu-sep" role="separator" data-experimental-only hidden></span>
              <button id="btn-selftest" class="menu-item" type="button" role="menuitem" data-experimental-only hidden>
                Self-test (experimental)
              </button>
            </div>
          </div>
          <span class="tool-sep"></span>
          <div class="menu">
            <button
              id="btn-view"
              class="menu-trigger"
              type="button"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="view-menu"
            >
              <span id="lbl-view">View</span>
              <svg class="caret" viewBox="0 0 10 6" aria-hidden="true">
                <path
                  d="M1 1l4 4 4-4"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <div id="view-menu" class="menu-panel" role="menu" aria-labelledby="btn-view" hidden>
              <button id="btn-auto" class="menu-item" type="button" role="menuitem">Arrange</button>
              <button id="btn-hide-unused" class="menu-item" type="button" role="menuitem">Hide unused</button>
              <span class="menu-sep" role="separator"></span>
              <button id="btn-hide-off" class="menu-item" type="button" role="menuitem" aria-pressed="false"></button>
              <button id="btn-labels" class="menu-item" type="button" role="menuitem" aria-pressed="false"></button>
            </div>
          </div>
          <span class="tool-sep"></span>
          <button id="btn-lang" class="icon-btn" type="button"></button>
          <button id="btn-theme" class="icon-btn" type="button"></button>
          <a
            id="btn-desktop"
            class="desktop-link"
            href="https://github.com/semnil/urx-router"
            target="_blank"
            rel="noopener"
            data-demo-only
            hidden
          >
            <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
              <path
                fill="currentColor"
                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
              />
            </svg>
            <span id="lbl-desktop">Desktop app</span>
          </a>
        </div>
      </header>
      <main id="stage">
        <div id="graph-host"></div>
        <aside id="inspector"></aside>
        <section id="console-host" hidden></section>
      </main>
      <footer id="statusbar"></footer>
    </div>
    <input id="file-input" type="file" accept="application/json,.json" hidden />
    <div id="consent" class="consent-scrim" role="dialog" aria-modal="true" aria-labelledby="consent-title" hidden>
      <div class="consent-box">
        <h2 id="consent-title"></h2>
        <div id="consent-body" class="consent-body"></div>
        <p id="consent-accept" class="consent-accept"></p>
        <div class="consent-actions">
          <button id="consent-quit" type="button" class="consent-btn-secondary"></button>
          <button id="consent-agree" type="button" class="consent-btn-primary"></button>
        </div>
      </div>
    </div>
    <div id="load-report" class="consent-scrim" role="dialog" aria-modal="true" aria-labelledby="load-report-title" hidden>
      <div class="consent-box">
        <h2 id="load-report-title"></h2>
        <p id="load-report-intro" class="load-report-intro"></p>
        <pre id="load-report-body" class="load-report-body" tabindex="0"></pre>
        <div class="consent-actions">
          <button id="load-report-copy" type="button" class="consent-btn-secondary"></button>
          <button id="load-report-close" type="button" class="consent-btn-primary"></button>
        </div>
      </div>
    </div>
    <div id="licenses-modal" class="consent-scrim" role="dialog" aria-modal="true" aria-labelledby="licenses-title" hidden>
      <div class="consent-box licenses-box">
        <h2 id="licenses-title"></h2>
        <iframe id="licenses-frame" class="licenses-frame" sandbox=""></iframe>
        <div class="consent-actions">
          <button id="licenses-close" type="button" class="consent-btn-primary"></button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
